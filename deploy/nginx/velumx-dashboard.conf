# VelumX Dashboard — dashboard.velumx.xyz → localhost:3000
# Copy to: /etc/nginx/sites-available/velumx-dashboard
# Then: sudo ln -s /etc/nginx/sites-available/velumx-dashboard /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d dashboard.velumx.xyz

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name dashboard.velumx.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.velumx.xyz;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dashboard.velumx.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.velumx.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Only TLS 1.2 and 1.3
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.velumx.xyz https://*.supabase.co wss://*.supabase.co; frame-ancestors 'self' https://velumx.xyz https://*.velumx.xyz;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # Request size limit
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Nginx-level rate limiting for dashboard
    # Zone defined in nginx.conf http block: limit_req_zone $binary_remote_addr zone=dashboard:10m rate=60r/m;
    limit_req zone=dashboard burst=20 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Next.js SSR timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Cache Next.js static assets aggressively (hashed filenames = safe to cache forever)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
