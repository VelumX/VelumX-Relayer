# VelumX Relayer — api.velumx.xyz → localhost:4000
# Copy to: /etc/nginx/sites-available/velumx-relayer
# Then: sudo ln -s /etc/nginx/sites-available/velumx-relayer /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d api.velumx.xyz

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.velumx.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.velumx.xyz;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.velumx.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.velumx.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Request size limit (blockchain tx payloads can be large)
    client_max_body_size 10M;

    # CORS preflight — handled here so the relayer doesn't need to
    # (Express CORS middleware still runs for actual requests)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running blockchain operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
