# VelumX Relayer — api.velumx.xyz → localhost:4000
# Copy to: /etc/nginx/sites-available/velumx-relayer
# Then: sudo ln -s /etc/nginx/sites-available/velumx-relayer /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d api.velumx.xyz

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.velumx.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.velumx.xyz;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.velumx.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.velumx.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Only TLS 1.2 and 1.3 — drop 1.0/1.1 (POODLE, BEAST)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Prevent nginx version disclosure
    server_tokens off;

    # Request size limit — 64KB is enough for any tx payload; blocks body-flood attacks
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Nginx-level rate limiting (defence-in-depth on top of Express rate limiter)
    # Zone defined in nginx.conf http block: limit_req_zone $binary_remote_addr zone=relayer_api:10m rate=30r/m;
    limit_req zone=relayer_api burst=10 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Pass the full chain so Express can see the real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Hide upstream server info from responses
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Timeouts for long-running blockchain operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }
}
